<p-toast></p-toast>
<p-dialog [(visible)]="visible" styleClass="w-[600px]" header="Compartir Nota: {{ currentNote()?.title }}" [modal]="true" class="p-fluid">
    <ng-template pTemplate="content">
        <!-- Compartir nueva -->
        <div class="flex flex-wrap gap-3 w-full">
            <div class="w-full">
                <label class="block mb-1 font-semibold">Añadir personas</label>
            </div>
            <div class="flex-1 min-w-[200px]">
                <p-select 
                    [options]="usuarios()" 
                    [(ngModel)]="selectedUsuario" 
                    optionLabel="name" 
                    placeholder="Seleccionar Usuario" 
                    [filter]="true" 
                    filterBy="name" 
                    [showClear]="true"
                    appendTo="body"
                    styleClass="w-full">
                </p-select>
            </div>
            <div class="min-w-[140px]">
                <p-select 
                    [options]="roles" 
                    [(ngModel)]="selectedRole" 
                    optionLabel="label" 
                    optionValue="value"
                    appendTo="body"
                    styleClass="w-full">
                </p-select>
            </div>
            <div class="flex items-end">
                <p-button label="Añadir" icon="pi pi-plus" (onClick)="shareMethod()" [disabled]="!selectedUsuario()"></p-button>
            </div>
        </div>

        <p-divider></p-divider>

        <!-- Lista de compartidos -->
        <div class="mt-4">
            <h5>Personas con acceso</h5>
            <p-table [value]="currentShares()" [tableStyle]="{'min-width': '100%'}">
                <ng-template pTemplate="header">
                    <tr>
                        <th>Usuario</th>
                        <th>Rol</th>
                        <th class="w-16"></th>
                    </tr>
                </ng-template>
                <ng-template pTemplate="body" let-share>
                    <tr>
                        <td>{{ share.usuario.name }}</td>
                        <td>
                            <span class="p-badge" [ngClass]="share.role === 1 ? 'p-badge-info' : 'p-badge-warning'">
                                {{ getRoleLabel(share.role) }}
                            </span>
                        </td>
                        <td>
                            <p-button icon="pi pi-times" [rounded]="true" [text]="true" severity="danger" (onClick)="removeShare(share.id)"></p-button>
                        </td>
                    </tr>
                </ng-template>
                <ng-template pTemplate="emptymessage">
                    <tr>
                        <td colspan="3" class="text-center">Esta nota no ha sido compartida con nadie aún.</td>
                    </tr>
                </ng-template>
            </p-table>
        </div>
    </ng-template>

    <ng-template pTemplate="footer">
        <p-button label="Cerrar" icon="pi pi-check" [text]="true" (onClick)="closeDialog()" />
    </ng-template>
</p-dialog>
