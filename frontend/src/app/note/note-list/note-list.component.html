<div class="card">
    <p-toolbar styleClass="mb-4 gap-2">
        <ng-template #start>
            <p-button severity="success" label="Nueva Nota" icon="pi pi-plus" class="mr-2" (onClick)="createNote()" />
        </ng-template>
        <ng-template #center>
            <h2 class="m-0">Mis Notas</h2>
        </ng-template>
    </p-toolbar>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 w-full">
        <div class="w-full" *ngFor="let note of dataNotes()">
            <p-card [header]="note.title" styleClass="h-full flex flex-col p-card-shadow w-full">
                <div class="note-content flex-grow min-h-[100px] whitespace-pre-wrap break-words">
                    {{ note.content }}
                </div>
                <ng-template pTemplate="footer">
                    <div class="flex justify-content-between mt-3">
                        <p-button icon="pi pi-share-alt" severity="info" [text]="true" (onClick)="shareNote(note)" pTooltip="Compartir" tooltipPosition="top"></p-button>
                        <div>
                            <p-button icon="pi pi-pencil" class="mr-2" [rounded]="true" [outlined]="true" severity="success" (onClick)="updateNote(note)" />
                            <p-button icon="pi pi-trash" [rounded]="true" [outlined]="true" severity="danger" (onClick)="deleteNote(note, $event)" />
                        </div>
                    </div>
                </ng-template>
            </p-card>
        </div>
    </div>

    <!-- Empty state -->
    <div class="text-center p-5" *ngIf="dataNotes().length === 0">
        <i class="pi pi-inbox text-5xl text-color-secondary"></i>
        <h3 class="text-color-secondary mt-3">No tienes notas guardadas</h3>
    </div>
</div>

<p-confirmdialog [style]="{ width: '450px' }" />

<!-- Child Components -->
<app-note (messageEvent)="loadNotes()"></app-note>
<app-noteshare></app-noteshare>
