<div class="card flex justify-center">
    <p-dialog header="Datos del Usuario" [modal]="true" [visible]="visible()" (visibleChange)="onDialogVisibleChange($event)" styleClass="w-[25rem]">
        <div class="flex items-center gap-4 mb-4">
            <label for="username" class="font-semibold w-24">Nombre</label>
            <input pInputText id="username" [(ngModel)]="entity().name" class="flex-auto" autocomplete="off" />
        </div>
        <div class="flex items-center gap-4 mb-4">
            <label for="email" class="font-semibold w-24">Email</label>
            <input pInputText id="email" [(ngModel)]="entity().email" class="flex-auto" autocomplete="off" />
        </div>
        <div class="flex items-center gap-4 mb-8">
            <label for="password" class="font-semibold w-24">Contraseña</label>
            <p-password id="password" [(ngModel)]="entity().password" [toggleMask]="true" [feedback]="false" class="flex-auto" autocomplete="off" />
        </div>
        <div class="flex justify-end gap-2">
            <p-button label="Cancelar" severity="secondary" (click)="closeDialog()" />
            <p-button label="Guardar" (click)="saveMethod()" />
        </div>
    </p-dialog>
</div>
